<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Campaign Route Optimizer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:420px;padding:24px}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-size:26px;font-weight:700;color:#fff}
.logo p{color:#888;font-size:14px;margin-top:6px}
.card{background:#1a1d27;border:1px solid #2d3148;border-radius:12px;padding:28px}
.tabs{display:flex;border-bottom:1px solid #2d3148;margin-bottom:22px}
.tab{flex:1;text-align:center;padding:10px;cursor:pointer;font-size:14px;color:#888;border-bottom:2px solid transparent;transition:color .15s}
.tab.active{color:#4a9eff;border-bottom-color:#4a9eff}
.tab-panel{display:none}.tab-panel.active{display:block}
label{display:block;font-size:12px;font-weight:500;color:#aaa;margin-bottom:4px;margin-top:14px}
label:first-child{margin-top:0}
input{width:100%;padding:9px 12px;background:#0f1117;border:1px solid #3d4168;border-radius:6px;color:#e0e0e0;font-size:14px}
input:focus{outline:none;border-color:#4a9eff}
.btn{width:100%;padding:10px;background:#4a9eff;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-top:18px}
.btn:hover{background:#3a8eef}
.alert{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:16px;background:#450a0a;color:#fca5a5;border:1px solid #7f1d1d}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <h1>🗺️ Route Optimizer</h1>
    <p>Campaign yard sign delivery management</p>
  </div>
  <div class="card">
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login',this)">🔑 Log In</div>
      <div class="tab" onclick="switchTab('signup',this)">✨ Sign Up</div>
    </div>
    <div id="login" class="tab-panel active">
      <form method="POST">
        <input type="hidden" name="action" value="login">
        <label>Email</label>
        <input type="text" name="email" placeholder="you@campaign.com" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••" required>
        <button class="btn" type="submit">Log In</button>
      </form>
    </div>
    <div id="signup" class="tab-panel">
      <form method="POST">
        <input type="hidden" name="action" value="signup">
        <label>Campaign Name</label>
        <input type="text" name="cname" placeholder="Smith for State Senate" required>
        <label>Email</label>
        <input type="text" name="email" placeholder="you@campaign.com" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="Min 6 characters" required>
        <label>Confirm Password</label>
        <input type="password" name="password2" placeholder="••••••" required>
        <button class="btn" type="submit">Create Account</button>
      </form>
    </div>
  </div>
</div>
<script>
function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
}
// Auto-switch to signup tab if error on signup
{% if error and request.form.get('action')=='signup' %}switchTab('signup', document.querySelectorAll('.tab')[1]);{% endif %}
</script>
</body>
</html>
