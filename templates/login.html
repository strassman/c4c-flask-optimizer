<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RouteOps — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080a0f; --surface: #0e1117; --surface2: #141822; --surface3: #1c2130;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --text: #f0f2f7; --text2: #8b92a5; --text3: #535a6b;
  --accent: #4f8ef7; --green: #34c759; --red: #ff3b30;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(79,142,247,0.08), transparent);
}
.wrap { width: 100%; max-width: 400px; padding: 24px; }
.logo { text-align: center; margin-bottom: 36px; }
.logo-icon {
  width: 52px; height: 52px;
  background: var(--accent);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  font-size: 24px;
  box-shadow: 0 8px 32px rgba(79,142,247,0.3);
}
.logo h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.03em; color: var(--text); }
.logo p { color: var(--text2); font-size: 13px; margin-top: 5px; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 28px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.4);
}
.tabs { display: flex; background: var(--surface2); border-radius: 9px; padding: 3px; margin-bottom: 24px; }
.tab {
  flex: 1; text-align: center; padding: 7px;
  cursor: pointer; font-size: 13px; font-weight: 500;
  color: var(--text2); border-radius: 7px;
  transition: all .2s;
}
.tab.active { background: var(--surface3); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.3); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; margin-top: 14px; letter-spacing: 0.01em; }
label:first-child { margin-top: 0; }
input {
  width: 100%; padding: 10px 13px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit;
  outline: none; transition: border-color .15s, background .15s;
}
input:focus { border-color: var(--accent); background: var(--surface3); }
input::placeholder { color: var(--text3); }
.btn {
  width: 100%; padding: 11px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 9px;
  font-size: 14px; font-weight: 500; font-family: inherit;
  cursor: pointer; margin-top: 20px;
  transition: opacity .15s, transform .1s;
  letter-spacing: 0.01em;
}
.btn:hover { opacity: .88; }
.btn:active { transform: scale(.99); }
.alert {
  padding: 10px 13px; border-radius: 8px; font-size: 13px; margin-bottom: 16px;
  background: rgba(255,59,48,.1); color: #ff7b73; border: 1px solid rgba(255,59,48,.2);
}
.footer { text-align: center; margin-top: 20px; font-size: 12px; color: var(--text3); }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="1.8"><rect x="1" y="8" width="14" height="8" rx="2"/><path d="M15 10h2l2 3v3h-4"/><circle cx="5" cy="17" r="1.5" fill="#fff" stroke="none"/><circle cx="13" cy="17" r="1.5" fill="#fff" stroke="none"/></svg></div>
    <h1>RouteOps</h1>
    <p>Campaign delivery management</p>
  </div>
  <div class="card">
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
      <div class="tab" id="tab-signup" onclick="switchTab('signup')">Create Account</div>
    </div>
    <div id="login" class="tab-panel active">
      <form method="POST">
        <input type="hidden" name="action" value="login">
        <label>Email address</label>
        <input type="text" name="email" placeholder="you@campaign.com" autocomplete="email" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        <button class="btn" type="submit">Sign In</button>
      </form>
    </div>
    <div id="signup" class="tab-panel">
      <form method="POST">
        <input type="hidden" name="action" value="signup">
        <label>Campaign name</label>
        <input type="text" name="cname" placeholder="Smith for State Senate" required>
        <label>Email address</label>
        <input type="text" name="email" placeholder="you@campaign.com" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="Minimum 6 characters" required>
        <label>Confirm password</label>
        <input type="password" name="password2" placeholder="••••••••" required>
        <button class="btn" type="submit">Create Account</button>
      </form>
    </div>
  </div>
  <div class="footer">Secure · Private · Campaign-ready</div>
</div>
<script>
function switchTab(id) {
  ['login','signup'].forEach(t => {
    document.getElementById(t).classList.toggle('active', t===id);
    document.getElementById('tab-'+t).classList.toggle('active', t===id);
  });
}
{% if error and request.form.get('action')=='signup' %}switchTab('signup');{% endif %}
</script>
</body>
</html>
