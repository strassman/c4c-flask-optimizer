<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Route Optimizer{% endblock %}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e0e0e0;min-height:100vh}
a{color:#4a9eff;text-decoration:none}
a:hover{text-decoration:underline}

/* Nav */
nav{background:#1a1d27;border-bottom:1px solid #2d3148;padding:0 24px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:100}
.nav-brand{font-weight:700;font-size:15px;color:#fff;padding:14px 20px 14px 0;border-right:1px solid #2d3148;margin-right:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
.nav-links{display:flex;flex:1;overflow-x:auto}
.nav-links a{color:#aaa;padding:14px 14px;font-size:13px;white-space:nowrap;border-bottom:2px solid transparent;transition:color .15s}
.nav-links a:hover{color:#fff;text-decoration:none}
.nav-links a.active{color:#4a9eff;border-bottom-color:#4a9eff}
.nav-logout{margin-left:auto;padding:6px 14px;background:#2d3148;color:#ccc;border:none;border-radius:6px;cursor:pointer;font-size:13px;white-space:nowrap}
.nav-logout:hover{background:#3d4168;color:#fff}

/* Layout */
.container{max-width:1200px;margin:0 auto;padding:28px 24px}
h1{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
h2{font-size:17px;font-weight:600;color:#fff;margin-bottom:12px}
h3{font-size:15px;font-weight:600;color:#ddd;margin-bottom:8px}
.subtitle{color:#888;font-size:13px;margin-bottom:24px}

/* Cards */
.card{background:#1a1d27;border:1px solid #2d3148;border-radius:10px;padding:20px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600;color:#fff;margin-bottom:14px}

/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
@media(max-width:768px){.grid2,.grid3,.grid4{grid-template-columns:1fr}}

/* Forms */
label{display:block;font-size:12px;font-weight:500;color:#aaa;margin-bottom:4px;margin-top:12px}
label:first-child{margin-top:0}
input[type=text],input[type=email],input[type=password],select,textarea{
  width:100%;padding:8px 11px;background:#0f1117;border:1px solid #3d4168;border-radius:6px;
  color:#e0e0e0;font-size:14px;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#4a9eff}
input[type=file]{color:#aaa;font-size:13px}

/* Buttons */
.btn{display:inline-block;padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:opacity .15s;text-align:center}
.btn:hover{opacity:.85;text-decoration:none}
.btn-primary{background:#4a9eff;color:#fff}
.btn-success{background:#22c55e;color:#fff}
.btn-danger{background:#ef4444;color:#fff}
.btn-secondary{background:#2d3148;color:#ccc}
.btn-warning{background:#f59e0b;color:#000}
.btn-full{width:100%;display:block}
.btn-sm{padding:5px 11px;font-size:12px}

/* Alerts */
.alert{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:16px}
.alert-success{background:#14532d;color:#86efac;border:1px solid #166534}
.alert-error{background:#450a0a;color:#fca5a5;border:1px solid #7f1d1d}
.alert-info{background:#1e3a5f;color:#93c5fd;border:1px solid #1d4ed8}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 10px;color:#888;font-weight:500;border-bottom:1px solid #2d3148;font-size:12px;text-transform:uppercase}
.tbl td{padding:8px 10px;border-bottom:1px solid #1e2235;color:#ddd;vertical-align:middle}
.tbl tr:hover td{background:#1e2235}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-green{background:#14532d;color:#86efac}
.badge-gray{background:#1e2235;color:#888}

/* Divider */
.divider{border:none;border-top:1px solid #2d3148;margin:20px 0}

/* Checkbox */
.check-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #1e2235}
.check-row:last-child{border-bottom:none}
input[type=checkbox]{width:16px;height:16px;margin-top:2px;cursor:pointer;accent-color:#4a9eff}

/* Expander / details */
details{background:#1e2235;border:1px solid #2d3148;border-radius:8px;margin-bottom:10px}
details summary{padding:12px 16px;cursor:pointer;font-size:14px;font-weight:500;color:#ddd;list-style:none;display:flex;align-items:center;gap:8px}
details summary::-webkit-details-marker{display:none}
details summary::before{content:'▶';font-size:10px;transition:transform .2s;color:#888}
details[open] summary::before{transform:rotate(90deg)}
details .detail-body{padding:0 16px 16px}

/* Tag chips */
.chip{display:inline-block;padding:3px 10px;background:#2d3148;border-radius:20px;font-size:12px;color:#aaa;margin:2px}

/* Spinner */
.spinner{display:none;width:18px;height:18px;border:2px solid #333;border-top-color:#4a9eff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .spinner{display:inline-block}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
<nav>
  <div class="nav-brand">🗺️ {{ session.get('cname','Campaign') }}</div>
  <div class="nav-links">
    <a href="/volunteers"    class="{% if request.path=='/volunteers' %}active{% endif %}">👥 Volunteers</a>
    <a href="/constituents"  class="{% if request.path=='/constituents' %}active{% endif %}">🗳️ Constituents</a>
    <a href="/delivery-run"  class="{% if request.path=='/delivery-run' %}active{% endif %}">🚐 Delivery Run</a>
    <a href="/map"           class="{% if request.path=='/map' %}active{% endif %}">🗺️ Map</a>
    <a href="/routes"        class="{% if request.path=='/routes' %}active{% endif %}">📍 Routes</a>
    <a href="/emails"        class="{% if request.path=='/emails' %}active{% endif %}">📧 Emails & Texts</a>
  </div>
  <form action="/logout" method="get" style="margin-left:12px">
    <button class="nav-logout" type="submit">Log Out</button>
  </form>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
</body>
</html>
